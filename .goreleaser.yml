version: 2

project_name: go-postgres-mcp

builds:
  - id: linux-amd64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: linux-arm64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w

  # macOS targets use Zig as C cross-compiler.
  # Zig is pinned to 0.13.0 in CI/release workflows because pg_query_go's
  # bundled C code conflicts with macOS 15.4+ SDK headers (strchrnul
  # static/non-static redeclaration). Zig 0.13.0 ships a pre-15.4 SDK.
  # Revisit when pg_query_go fixes upstream:
  # https://github.com/pganalyze/pg_query_go/issues/XXX
  - id: darwin-amd64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-macos
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: darwin-arm64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-macos
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: peter-trerotola
    name: go-postgres-mcp
