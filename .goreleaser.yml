version: 2

project_name: go-postgres-mcp

builds:
  - id: linux-amd64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: linux-arm64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w

  # macOS targets require a macOS host (not cross-compiled). In CI, these are
  # built with --id darwin-amd64 --id darwin-arm64 on a macos-14 runner.
  # macos-14 is used because pg_query_go's bundled C code conflicts with the
  # macOS 15.4+ SDK (strchrnul redeclaration). macos-14 has Xcode 16.2 which
  # ships the macOS 15.2 SDK, avoiding this issue.
  - id: darwin-amd64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: darwin-arm64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: peter-trerotola
    name: go-postgres-mcp
