version: 2

project_name: go-postgres-mcp

builds:
  - id: linux-amd64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: linux-arm64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - linux
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w

  # macOS targets use Zig as C cross-compiler from Linux.
  # CGO_CFLAGS includes -DHAVE_STRCHRNUL because pg_query_go's bundled C
  # code defines a static strchrnul, which conflicts with macOS 15.4+ SDK
  # headers that declare it non-static. The define tells pg_query_go to use
  # the system's strchrnul instead of its own.
  - id: darwin-amd64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - darwin
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-DHAVE_STRCHRNUL
      - CC=zig cc -target x86_64-macos
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: darwin-arm64
    main: ./cmd/main.go
    binary: go-postgres-mcp
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-DHAVE_STRCHRNUL
      - CC=zig cc -target aarch64-macos
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: peter-trerotola
    name: go-postgres-mcp
