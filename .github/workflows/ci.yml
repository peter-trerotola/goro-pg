name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check gofmt -s
        run: |
          diff=$(gofmt -s -d .)
          if [ -n "$diff" ]; then
            echo "$diff"
            echo "::error::Files not formatted with gofmt -s. Run: gofmt -s -w ."
            exit 1
          fi

      - name: Check gocyclo
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0
          gocyclo -over 15 .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run tests
        run: CGO_ENABLED=1 go test ./... -v -race

  build-linux:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build Linux targets (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --snapshot --clean --id linux-amd64 --id linux-arm64

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t go-postgres-mcp .

  # Uses macos-14 (Xcode 16.2, macOS 15.2 SDK) because pg_query_go's
  # bundled C code conflicts with macOS 15.4+ SDK headers.
  build-darwin:
    runs-on: macos-14
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build macOS targets (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --snapshot --clean --id darwin-amd64 --id darwin-arm64

  # Reports job results as commit statuses when CI is triggered via
  # workflow_dispatch (e.g., for release-please PRs). This is needed because
  # workflow_dispatch runs don't create check runs linked to PR check suites.
  report-status:
    runs-on: ubuntu-latest
    needs: [lint, test, build-linux, build-docker, build-darwin]
    if: always() && github.event_name == 'workflow_dispatch'
    steps:
      - name: Report job statuses to commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_LINUX_RESULT: ${{ needs.build-linux.result }}
          BUILD_DOCKER_RESULT: ${{ needs.build-docker.result }}
          BUILD_DARWIN_RESULT: ${{ needs.build-darwin.result }}
        run: |
          report_status() {
            local context="$1" result="$2"
            local state="failure"
            if [ "$result" = "success" ]; then state="success"; fi
            gh api "repos/${{ github.repository }}/statuses/$SHA" \
              -f state="$state" \
              -f context="$context" \
              -f description="CI $context ($result)" \
              -f target_url="$RUN_URL"
          }
          report_status "lint" "$LINT_RESULT"
          report_status "test" "$TEST_RESULT"
          report_status "build-linux" "$BUILD_LINUX_RESULT"
          report_status "build-docker" "$BUILD_DOCKER_RESULT"
          report_status "build-darwin" "$BUILD_DARWIN_RESULT"
