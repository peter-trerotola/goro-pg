name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run tests
        run: CGO_ENABLED=1 go test ./... -v -race

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      # Pinned to 0.13.0: pg_query_go's bundled C code conflicts with the
      # macOS 15.4 SDK shipped in Zig 0.15+. See .goreleaser.yml for details.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build all targets (GoReleaser snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --snapshot --clean

      - name: Build Docker image
        run: docker build -t go-postgres-mcp .
