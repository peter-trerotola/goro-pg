name: Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

      - name: Extract version from tag
        id: version
        if: ${{ steps.release.outputs.release_created }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.release.outputs.tag_name }}

  test:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Run tests
        run: CGO_ENABLED=1 go test ./... -race

  build-linux:
    runs-on: ubuntu-latest
    needs: [release-please, test]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build Linux targets
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --clean --id linux-amd64 --id linux-arm64

      - name: Archive Linux binaries
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          mkdir -p archives
          cd dist/linux-amd64_*/
          tar czf "../../archives/go-postgres-mcp_${VERSION}_linux_amd64.tar.gz" go-postgres-mcp
          cd ../..
          cd dist/linux-arm64_*/
          tar czf "../../archives/go-postgres-mcp_${VERSION}_linux_arm64.tar.gz" go-postgres-mcp

      - name: Upload Linux archives
        uses: actions/upload-artifact@v4
        with:
          name: archives-linux
          path: archives/

  # Uses macos-14 (Xcode 16.2, macOS 15.2 SDK) because pg_query_go's
  # bundled C code conflicts with macOS 15.4+ SDK headers.
  build-darwin:
    runs-on: macos-14
    needs: [release-please, test]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS targets
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: build --clean --id darwin-amd64 --id darwin-arm64

      - name: Archive macOS binaries
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          mkdir -p archives
          cd dist/darwin-amd64_*/
          tar czf "../../archives/go-postgres-mcp_${VERSION}_darwin_amd64.tar.gz" go-postgres-mcp
          cd ../..
          cd dist/darwin-arm64_*/
          tar czf "../../archives/go-postgres-mcp_${VERSION}_darwin_arm64.tar.gz" go-postgres-mcp

      - name: Upload macOS archives
        uses: actions/upload-artifact@v4
        with:
          name: archives-darwin
          path: archives/

  publish:
    runs-on: ubuntu-latest
    needs: [release-please, build-linux, build-darwin]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux archives
        uses: actions/download-artifact@v4
        with:
          name: archives-linux
          path: archives/

      - name: Download macOS archives
        uses: actions/download-artifact@v4
        with:
          name: archives-darwin
          path: archives/

      - name: Generate checksums
        working-directory: archives
        run: sha256sum *.tar.gz > checksums.txt

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" archives/* --repo "$GITHUB_REPOSITORY"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"

  docker:
    runs-on: ubuntu-latest
    needs: [release-please, publish]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/${{ github.repository }}:latest
